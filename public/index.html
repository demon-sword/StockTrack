<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>StockTrack - Inventory Management</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
</head>
<body>
  <div id="root"></div>
  <script>
    // Error logging for debugging
    window.onerror = function(msg, url, line) {
      console.error('Error: ' + msg + ' at ' + url + ':' + line);
      document.getElementById('root').innerHTML = '<div style="padding:20px; color:red;"><h3>Error Loading App</h3><p>' + msg + '</p></div>';
      return true;
    };
  </script>
</body>
</html>
